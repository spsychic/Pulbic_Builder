<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물상 테스트 | 고양이상 vs 강아지상</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page">
        <header class="top-bar">
            <div>
                <h1>동물상 테스트</h1>
                <p class="subtitle">웹캠으로 확인하는 고양이상 vs 강아지상</p>
            </div>
            <div class="controls">
                <button id="theme-toggle" class="toggle-button" type="button" aria-pressed="false">Dark Mode</button>
                <button id="wide-toggle" class="toggle-button" type="button" aria-pressed="false">Wide Mode</button>
            </div>
        </header>

        <main class="content">
            <section class="hero-card">
                <div>
                    <h2>카메라를 켜고 바로 테스트</h2>
                    <p>Teachable Machine 모델로 분류합니다. 영상은 브라우저에서만 처리됩니다.</p>
                </div>
                <div class="hero-actions">
                    <button id="start-btn" class="primary-button">테스트 시작</button>
                    <button id="stop-btn" class="ghost-button" disabled>중지</button>
                </div>
                <p id="status" class="status">대기 중입니다.</p>
            </section>

            <section class="grid">
                <div class="card">
                    <h3>실시간 카메라</h3>
                    <div id="webcam-container" class="webcam"></div>
                </div>
                <div class="card">
                    <h3>결과</h3>
                    <div class="result-hero">
                        <span id="result-label" class="result-label">-</span>
                        <span id="result-score" class="result-score">0%</span>
                    </div>
                    <div id="results-list" class="results-list"></div>
                </div>
            </section>
        </main>

        <section class="partner-form-section" aria-labelledby="partner-form-title">
            <div class="form-header">
                <h2 id="partner-form-title">Partnership Inquiry</h2>
                <p>Reach out for collaborations or business inquiries. We will get back within 2 business days.</p>
            </div>
            <form class="partner-form" action="https://formspree.io/f/xgolpvzg" method="POST">
                <label>
                    Name
                    <input type="text" name="name" placeholder="Your name" autocomplete="name" required>
                </label>
                <label>
                    Company
                    <input type="text" name="company" placeholder="Company name" autocomplete="organization">
                </label>
                <label>
                    Email
                    <input type="email" name="email" placeholder="you@company.com" autocomplete="email" required>
                </label>
                <label>
                    Message
                    <textarea name="message" rows="5" placeholder="Tell us about the partnership." required></textarea>
                </label>
                <button class="submit-button" type="submit">Send Inquiry</button>
            </form>
        </section>

        <section class="comments-section" aria-labelledby="comments-title">
            <div class="form-header">
                <h2 id="comments-title">Comments</h2>
                <p>Share feedback or ideas below.</p>
            </div>
            <div id="disqus_thread"></div>
            <script>
                (function() {
                    var d = document, s = d.createElement('script');
                    s.src = 'https://spsychic.disqus.com/embed.js';
                    s.setAttribute('data-timestamp', +new Date());
                    (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the comments powered by Disqus.</noscript>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="main.js" type="module"></script>
</body>
</html>
