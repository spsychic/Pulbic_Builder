<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <h1>Lotto Number Generator</h1>
            <div class="controls">
                <button id="theme-toggle" class="toggle-button" type="button" aria-pressed="false">Dark Mode</button>
                <button id="wide-toggle" class="toggle-button" type="button" aria-pressed="false">Wide Mode</button>
            </div>
        </div>
        <div id="lotto-numbers" class="lotto-numbers-container"></div>
        <button id="generate-btn" class="generate-button">Generate Numbers</button>
        <section class="partner-form-section" aria-labelledby="partner-form-title">
            <div class="form-header">
                <h2 id="partner-form-title">Partnership Inquiry</h2>
                <p>Reach out for collaborations or business inquiries. We will get back within 2 business days.</p>
            </div>
            <form class="partner-form" action="https://formspree.io/f/xgolpvzg" method="POST">
                <label>
                    Name
                    <input type="text" name="name" placeholder="Your name" autocomplete="name" required>
                </label>
                <label>
                    Company
                    <input type="text" name="company" placeholder="Company name" autocomplete="organization">
                </label>
                <label>
                    Email
                    <input type="email" name="email" placeholder="you@company.com" autocomplete="email" required>
                </label>
                <label>
                    Message
                    <textarea name="message" rows="5" placeholder="Tell us about the partnership." required></textarea>
                </label>
                <button class="submit-button" type="submit">Send Inquiry</button>
            </form>
        </section>
    </div>
    <script src="main.js" type="module"></script>
</body>
</html>
